services:
  db:
    image: postgres:15-alpine
    container_name: fitbuddy_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - fitbuddy_network

  backend:
    build: ./backend
    container_name: fitbuddy_backend
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - fitbuddy_network

  frontend:
    build: ./frontend
    container_name: fitbuddy_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - fitbuddy_network

volumes:
  pgdata:

networks:
  fitbuddy_network: